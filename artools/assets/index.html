<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Pen - A caneta mais tecnológica do mundo</title>
    
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- GSAP, ScrollTrigger & Lenis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    
    <style>
        :root {
            --bg-main: #FFFFFF;
            --bg-secondary: #F5F5F0;
            --text-primary: #1C1C1C;
            --text-secondary: #6B6B6B;
            --border-color: #E0E0E0;
            --accent: #1C1C1C;
            --transition-smooth: cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (prefers-color-scheme: dark) {
            /* Fallback dark mode if needed, though instructions ask for off-white/light gray from ds2.html */
            /* We will stick strictly to the ds2.html palette as requested */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Lenis base styles */
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 
         * Hero Container 
         * Pinning container for the ScrollTrigger scrubbing effect.
         */
        .hero-track {
            position: relative;
            width: 100%;
            height: 350vh; /* Scroll distance */
        }

        .hero-container {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            display: block;
            overflow: hidden;
        }

        /* Typography & Content */
        .hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5vw 0 10vw;
            height: 100%;
            width: 60%;
            min-width: 500px;
            background: linear-gradient(to right, var(--bg-main) 10%, rgba(255, 255, 255, 0.5) 70%, transparent 100%);
        }

        @media (max-width: 900px) {
            .hero-content {
                width: 100%;
                min-width: 0;
                padding: 0 8vw;
                background: linear-gradient(to top, var(--bg-main) 10%, rgba(255, 255, 255, 0.5) 70%, transparent 100%);
                justify-content: flex-end;
                padding-bottom: 15vh;
            }
        }

        /* Masked Text Reveal (from ds2.html) */
        .text-reveal-wrapper {
            overflow: hidden;
            display: block;
            line-height: 1.1;
        }

        .text-reveal-content {
            display: block;
            transform: translateY(110%);
        }

        .hero-title {
            font-size: clamp(3rem, 5vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        /* Outline text effect */
        .text-outline {
            color: transparent;
            -webkit-text-stroke: 1.5px var(--text-primary);
            font-weight: 600;
        }

        .hero-description {
            font-size: clamp(1.125rem, 1.5vw, 1.25rem);
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 480px;
            opacity: 0; /* for GSAP */
        }

        /* Buttons */
        .hero-actions {
            display: flex;
            gap: 1rem;
            opacity: 0; /* for GSAP */
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.4s var(--transition-smooth);
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #FFF;
            border: 1px solid var(--accent);
        }

        .btn-primary:hover {
            background-color: transparent;
            color: var(--text-primary);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--text-primary);
            background-color: rgba(0,0,0,0.03);
        }

        .btn-secondary .arrow {
            transition: transform 0.4s var(--transition-smooth);
        }

        .btn-secondary:hover .arrow {
            transform: translateY(3px);
        }

        /* Fullscreen Video / Canvas */
        .hero-visual {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.95;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 900px) {
            .hero-visual {
                opacity: 0.85; /* Slightly less opaque on mobile */
            }
        }

        .hero-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Mask image to blend edges smoothly with background */
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 100%);
            mask-image: radial-gradient(circle, black 50%, transparent 100%);
        }

        /* UI Accents */
        .floating-indicator {
            position: fixed;
            right: 3vw;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 50;
            opacity: 0; /* for GSAP */
        }

        .floating-indicator span {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .indicator-line {
            width: 1px;
            height: 40px;
            background-color: var(--border-color);
            position: relative;
        }

        .indicator-line-progress {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: var(--accent);
        }

        .scroll-to-control {
            position: absolute;
            bottom: 3vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            z-index: 50;
            opacity: 0; /* for GSAP */
        }

        .scroll-text {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .scroll-line {
            width: 1px;
            height: 30px;
            background-color: var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .scroll-line::before {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--accent);
            animation: scrollPulse 2s infinite ease-in-out;
        }

        @keyframes scrollPulse {
            0% { top: -100%; }
            50% { top: 0%; }
            100% { top: 100%; }
        }

        /* Fallback for reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .scroll-line::before {
                animation: none;
                top: 0;
            }
            .hero-track {
                height: 100vh; /* Disable extra scrolling */
            }
            .text-reveal-content,
            .hero-description,
            .hero-actions,
            .floating-indicator,
            .scroll-to-control {
                transform: none !important;
                opacity: 1 !important;
            }
        }
        /* Navigation (Inspired by design_system.html) */
        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .header-container {
            max-width: 80rem;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.5rem;
            position: relative;
        }

        .header-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex: 1;
        }

        .header-links.justify-end {
            justify-content: flex-end;
        }

        .nav-link {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--text-secondary);
        }

        .header-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .logo-text {
            font-weight: 700;
            letter-spacing: -0.05em;
            font-size: 1.125rem;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .hide-mobile { display: none; }
            .header-links { gap: 1rem; }
        }

        /* Nav Load Animation (from design_system.html) */
        .nav-load {
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.8s ease-out;
        }

        .nav-load.loaded {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <header class="header-nav nav-load">
        <div class="header-container">
            <div class="header-links">
                <a href="#design" class="nav-link">Design</a>
                <a href="#technology" class="nav-link hide-mobile">Tech</a>
            </div>
            <div class="header-logo group">
                <span class="logo-text">PRECISION PEN</span>
            </div>
            <div class="header-links justify-end">
                <a href="#buy" class="nav-link hide-mobile">Buy</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
        </div>
    </header>

    <!-- Scroll Track -->
    <div class="hero-track">
        
        <!-- Sticky Container -->
        <div class="hero-container">
            
            <!-- Content Left -->
            <div class="hero-content">
                <h1 class="hero-title">
                    <span class="text-reveal-wrapper">
                        <span class="text-reveal-content">A caneta mais</span>
                    </span>
                    <span class="text-reveal-wrapper">
                        <span class="text-reveal-content text-outline">tecnológica</span>
                    </span>
                    <span class="text-reveal-wrapper">
                        <span class="text-reveal-content">do mundo.</span>
                    </span>
                </h1>
                
                <p class="hero-description">
                    Desenhada com precisão absoluta e materiais aeroespaciais. 
                    Experimente o futuro da escrita com controle fluído e um 
                    design que desafia a gravidade.
                </p>
                
                <div class="hero-actions">
                    <a href="#" class="btn btn-primary">
                        Comprar Agora
                    </a>
                    <a href="#explore" class="btn btn-secondary">
                        Explorar <span class="arrow">↓</span>
                    </a>
                </div>
            </div>

            <!-- Visual Right -->
            <div class="hero-visual">
                <canvas id="hero-canvas" class="hero-canvas"></canvas>
            </div>

            <!-- Accents -->
            <div class="floating-indicator">
                <span>01</span>
                <div class="indicator-line">
                    <div class="indicator-line-progress"></div>
                </div>
            </div>

            <div class="scroll-to-control">
                <span class="scroll-text">Scroll to Control</span>
                <div class="scroll-line"></div>
            </div>

        </div>
    </div>

    <!-- Extra space to test scrolling past the hero -->
    <div style="height: 100vh; background: var(--bg-main); display: flex; align-items: center; justify-content: center;">
        <h2 style="font-weight: 300; font-size: 2rem; color: var(--text-secondary);">Continue Explorando...</h2>
    </div>

    <script>
        // Register GSAP plugins
        gsap.registerPlugin(ScrollTrigger);

        document.addEventListener("DOMContentLoaded", () => {
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            // Navigation load animation (from design_system.html)
            setTimeout(() => {
                document.querySelector('.header-nav').classList.add('loaded');
            }, 100);

            // Initialize Lenis for buttery smooth scrolling
            if (!prefersReducedMotion) {
                const lenis = new Lenis({
                    duration: 1.5,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                    orientation: 'vertical',
                    gestureOrientation: 'vertical',
                    smoothWheel: true,
                    wheelMultiplier: 1,
                    smoothTouch: false,
                    touchMultiplier: 2,
                    infinite: false,
                });

                lenis.on('scroll', ScrollTrigger.update);

                gsap.ticker.add((time)=>{
                    lenis.raf(time * 1000);
                });
                
                gsap.ticker.lagSmoothing(0);
            }

            /* ====================================================================
               1. COREOGRAFIA DE ENTRADA (LOAD ANIMATION)
               ==================================================================== */
            if (!prefersReducedMotion) {
                const tlLoad = gsap.timeline({ defaults: { ease: "power4.out" } });

                // Text Reveal with Blur In
                gsap.set(".hero-title .text-reveal-content", { filter: "blur(10px)" });
                tlLoad.to(".hero-title .text-reveal-content", {
                    y: "0%",
                    filter: "blur(0px)",
                    duration: 1.2,
                    stagger: 0.15
                })
                // Paragraph & Buttons with Fade & Blur In
                .to([".hero-description", ".hero-actions"], {
                    opacity: 1,
                    y: 0,
                    filter: "blur(0px)",
                    duration: 1,
                    stagger: 0.2
                }, "-=0.6")
                // UI Accents
                .to([".floating-indicator", ".scroll-to-control"], {
                    opacity: 1,
                    duration: 1
                }, "-=0.5");
                
                // Initialize positions for elements that fade in and move up
                gsap.set([".hero-description", ".hero-actions"], { y: 20, opacity: 0, filter: "blur(15px)" });
            }

            /* ====================================================================
               2. VIDEO SCRUBBING & CANVAS RENDERING
               ==================================================================== */
            const canvas = document.getElementById("hero-canvas");
            const ctx = canvas.getContext("2d");
            
            // Create a video element in the DOM (hidden) to ensure proper loading
            const video = document.createElement("video");
            video.style.display = "none";
            document.body.appendChild(video);
            
            // Usando o caminho relativo correto baseado no contexto da pasta assets
            video.src = "raw_files/video2.mp4";
            video.muted = true;
            video.playsInline = true;
            video.preload = "auto";
            video.load(); // Force load

            let videoDuration = 0;

            video.addEventListener("loadedmetadata", () => {
                videoDuration = video.duration || 5; // fallback
                canvas.width = video.videoWidth || 1920;
                canvas.height = video.videoHeight || 1080;
                
                // Draw initial frame
                video.currentTime = 0;
            });

            // Wait for data to be loaded to safely draw the first frame
            video.addEventListener("loadeddata", () => {
                 ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            });

            // Se o usuário prefere movimento reduzido, não configuramos o scroll scrub
            if (!prefersReducedMotion) {
                // Objeto proxy para o GSAP animar (permite interpolação muito suave)
                const scrollObj = { currentTime: 0 };

                ScrollTrigger.create({
                    trigger: ".hero-track",
                    start: "top top",
                    end: "bottom bottom", // Usa a altura inteira do track (350vh)
                    scrub: 1.2, // Ease/Interpolação de 1.2 segundos (Smoothing avançado)
                    onUpdate: (self) => {
                        // Calcula o tempo alvo baseado no progresso do scroll
                        const targetTime = self.progress * videoDuration;
                        gsap.to(scrollObj, {
                            currentTime: targetTime,
                            duration: 0.5,
                            ease: "power2.out",
                            overwrite: true
                        });
                        
                        // Atualiza a barra de indicador (0 a 100%)
                        gsap.to(".indicator-line-progress", {
                            height: `${self.progress * 100}%`,
                            duration: 0.1
                        });
                        
                        // Fade in / out e Blur out dos textos e botões ao rolar para baixo
                        const fadeOutProgress = Math.max(0, Math.min(1, (self.progress - 0.01) * 5)); 
                        gsap.to([".hero-title", ".hero-description", ".hero-actions"], {
                            opacity: 1 - fadeOutProgress,
                            filter: `blur(${fadeOutProgress * 20}px)`,
                            y: fadeOutProgress * -40,
                            duration: 0.3,
                            overwrite: "auto"
                        });
                        
                        // Esconde a seta de scroll ao rolar
                        if (self.progress > 0.05) {
                            gsap.to(".scroll-to-control", { opacity: 0, filter: "blur(5px)", duration: 0.3 });
                        } else {
                            gsap.to(".scroll-to-control", { opacity: 1, filter: "blur(0px)", duration: 0.3 });
                        }
                    }
                });

                // RequestAnimationFrame loop para desenhar no canvas usando GSAP Ticker
                gsap.ticker.add(() => {
                    // Evita atualizações desnecessárias se o tempo for o mesmo
                    if (video.currentTime !== scrollObj.currentTime && video.readyState >= 2) {
                        video.currentTime = scrollObj.currentTime;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    }
                });
            } else {
                // Com reduzido movimento, apenas damos play no vídeo estático e colocamos na tela
                video.loop = true;
                video.play();
                gsap.ticker.add(() => {
                    if (video.readyState >= 2) {
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    }
                });
            }

            // Magnetic Button Effect (Microinteração Avançada)
            const btnPrimary = document.querySelector('.btn-primary');
            if (btnPrimary && !prefersReducedMotion) {
                btnPrimary.addEventListener('mousemove', (e) => {
                    const rect = btnPrimary.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    
                    gsap.to(btnPrimary, {
                        x: x * 0.2,
                        y: y * 0.2,
                        duration: 0.6,
                        ease: "power3.out"
                    });
                });

                btnPrimary.addEventListener('mouseleave', () => {
                    gsap.to(btnPrimary, {
                        x: 0,
                        y: 0,
                        duration: 0.6,
                        ease: "elastic.out(1, 0.3)"
                    });
                });
            }
        });
    </script>
</body>
</html>
